<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ALLEN ZHENG | GAME</title>
    <meta name="description" content="Brawl Stars competitive strategy portfolio by Allen Zheng.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header solid">
      <a class="brand" href="index.html">ALLEN ZHENG</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">HOME</a>
        <a href="academic.html">Academic & Research</a>
        <a href="athletic.html">Athletic</a>
        <a class="active" href="game.html">Game</a>
        <a href="art.html">Art</a>
      </nav>
    </header>

    <main class="media-page">
      <section class="simple-title">
        <h1>GAME</h1>
        <p>Brawl Stars ranking proof and tactical clips.</p>
      </section>

      <section class="lead-images">
        <img src="assets/Brawl%20Stars/Brawl%20star.png" alt="Allen's Brawler Showcase">
        <img src="assets/Brawl%20Stars/Top%20200%20finished%20in%20US.jpg" alt="Top 200 US leaderboard evidence">
      </section>

      <section class="video-grid two-by-two" aria-label="Brawl Stars clips">
        <article class="video-tile" data-video-card>
          <video src="assets/Brawl%20Stars/mandi.mp4" loop playsinline preload="auto" data-preview-time="12"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play Mandi clip"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>
        <article class="video-tile" data-video-card>
          <video src="assets/Brawl%20Stars/kenji-h264.mp4" loop playsinline preload="auto" data-preview-time="4"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play Kenji clip"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>
        <article class="video-tile" data-video-card>
          <video src="assets/Brawl%20Stars/kaze-h264.mp4" loop playsinline preload="auto" data-preview-time="2"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play Kaze clip"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>
        <article class="video-tile" data-video-card>
          <video src="assets/Brawl%20Stars/mandi-gem-h264.mp4" loop playsinline preload="auto" data-preview-time="3"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play Mandi gem clip"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
