<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ALLEN ZHENG | ART</title>
    <meta name="description" content="Art and music practice portfolio by Allen Zheng.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header light">
      <a class="brand" href="index.html">ALLEN ZHENG</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">HOME</a>
        <a href="academic.html">Academic & Research</a>
        <a href="athletic.html">Athletic</a>
        <a href="game.html">Game</a>
        <a class="active" href="art.html">Art</a>
      </nav>
    </header>

    <main>
      <section class="art-hero page-hero">
        <img src="assets/music/self.jpg" alt="Allen at piano">
        <div class="dark-overlay warm visible-media"></div>
        <div>
          <h1>ART</h1>
          <p>
            Music practice as a visual and performed record: ensemble, clarinet, piano,
            and rehearsal moments arranged as a media portfolio.
          </p>
        </div>
      </section>

      <section class="art-grid" aria-label="Art and music media">
        <img src="assets/music/self.jpg" alt="Allen at the piano">
        <img src="assets/music/0e59b9f7f7461667fbc5a3a8b85a8d4e.png" alt="Orchestra performance">
        <img src="assets/music/bd1277a6a4d055dae7a53d41e18e1d7b.jpg" alt="Music practice">

        <article class="video-tile" data-video-card>
          <video src="assets/music/Nocturne.mp4" poster="assets/music/self.jpg" loop playsinline preload="metadata"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play Nocturne"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>

        <article class="video-tile" data-video-card>
          <video src="assets/music/Allen%20Zheng%20clarinet%20performing%20video.mp4" poster="assets/music/1f098126cece2d29e08d02088daa9307.jpg" loop playsinline preload="metadata"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play clarinet performance"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>

        <article class="video-tile" data-video-card>
          <video src="assets/music/Allen%20Zheng%20Performing%20clarinet%20video.mp4" poster="assets/music/0e59b9f7f7461667fbc5a3a8b85a8d4e.png" loop playsinline preload="metadata"></video>
          <button class="tile-play" type="button" data-video-play aria-label="Play ensemble performance"><span data-play-icon>Play</span></button>
          <button class="tile-mute" type="button" data-video-mute><span data-mute-icon>Muted</span></button>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
